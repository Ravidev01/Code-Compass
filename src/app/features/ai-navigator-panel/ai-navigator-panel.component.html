<aside class="glass-panel p-4">
  <div class="mb-3 flex items-center justify-between">
    <h3 class="text-sm font-semibold text-white">AI Navigator <span class="text-slate-400">(Architect)</span></h3>
    <span class="text-slate-400 transition hover:text-indigo-300" role="img" aria-label="info">ℹ</span>
  </div>

  <div class="mb-4 rounded-xl border border-white/10 bg-slate-900/70 p-3">
    <div class="mb-2 flex items-center gap-2">
      <div class="grid h-8 w-8 place-content-center rounded-full bg-gradient-to-br from-indigo-500 to-fuchsia-500 text-sm" role="img">🤖</div>
      <div class="flex-1">
        <p class="text-xs font-medium text-slate-200">AI Navigator</p>
        <p class="text-[10px] text-slate-500">
          <span class="inline-block h-1.5 w-1.5 rounded-full bg-emerald-400 mr-1 animate-pulse"></span>
          Analyzing
        </p>
      </div>
    </div>
    <p class="mt-3 rounded-lg border border-indigo-400/30 bg-indigo-500/10 px-3 py-2 text-xs leading-relaxed text-indigo-100 font-medium">{{ navigatorResponse() }}</p>
  </div>

  <div class="mb-3 rounded-xl border border-white/10 bg-slate-900/70 px-3 py-2 text-xs text-slate-500 text-center">
    🎯 Ask AI Navigator anything
  </div>

  <p class="mb-3 text-[11px] font-semibold uppercase tracking-[0.2em] text-slate-500">Suggested prompts</p>
  <div class="space-y-2">
    <button
      *ngFor="let suggestion of suggestions()"
      class="w-full rounded-xl border border-white/10 bg-slate-900/65 px-3 py-2.5 text-left text-xs text-slate-300 transition hover:border-indigo-400/80 hover:text-white"
      [class.border-indigo-400/80]="activeCommand() === suggestion"
      [class.text-white]="activeCommand() === suggestion"
      type="button"
      (click)="runSuggestion(suggestion)"
    >
      <span class="inline-flex items-center gap-2 w-full">
        <span class="text-indigo-400 opacity-0 transition group-hover:opacity-100">→</span>
        {{ suggestion }}
        <span class="text-slate-600 ml-auto text-[10px]" *ngIf="activeCommand() === suggestion">✓</span>
      </span>
    </button>
  </div>
</aside>
